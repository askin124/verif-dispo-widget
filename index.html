<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vérif Dispo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f8fafc;
    color: #1e293b;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .header {
    background: #fff;
    border-bottom: 1px solid #e2e8f0;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .header-dot { width: 8px; height: 8px; border-radius: 50%; background: #16a34a; }
  .header h1 { font-size: 14px; font-weight: 600; }
  .header-badges { margin-left: auto; display: flex; gap: 6px; }
  .badge { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 20px; background: #dcfce7; color: #15803d; }
  .badge.blue { background: #dbeafe; color: #1d4ed8; }

  .nav-mois {
    background: #fff;
    border-bottom: 1px solid #e2e8f0;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .nav-mois button {
    background: none; border: 1px solid #e2e8f0; border-radius: 6px;
    padding: 4px 10px; cursor: pointer; font-size: 13px; color: #475569;
  }
  .nav-mois button:hover { background: #f1f5f9; }
  .nav-mois h2 { font-size: 14px; font-weight: 600; color: #1e293b; text-transform: capitalize; }

  .cal-wrapper { flex: 1; overflow-y: auto; padding: 12px 16px; }

  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }

  .cal-header-cell {
    text-align: center; font-size: 11px; font-weight: 700;
    color: #94a3b8; padding: 4px 0 8px; letter-spacing: 0.5px; text-transform: uppercase;
  }

  .cal-day {
    min-height: 72px; border-radius: 8px; padding: 6px;
    background: #fff; border: 1px solid #f1f5f9;
  }
  .cal-day.autre-mois { background: #f8fafc; border-color: transparent; }
  .cal-day.autre-mois .day-num { color: #cbd5e1; }
  .cal-day.weekend { background: #fafafa; border-color: transparent; }
  .cal-day.weekend .day-num { color: #e2e8f0; }
  .cal-day.has-dispo { background: #fff; border-color: #bbf7d0; }
  .cal-day.has-dispo:hover { border-color: #16a34a; box-shadow: 0 2px 8px rgba(22,163,74,0.12); }
  .cal-day.today .day-num {
    background: #16a34a; color: #fff;
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }

  .day-num {
    font-size: 12px; font-weight: 600; color: #475569;
    margin-bottom: 4px; width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
  }

  .creneau-pill {
    display: block; font-size: 10px; font-weight: 600;
    background: #dcfce7; color: #15803d; border-radius: 4px;
    padding: 2px 4px; margin-bottom: 2px; cursor: pointer;
    text-align: center; transition: all 0.1s; border: 1px solid transparent;
  }
  .creneau-pill:hover { background: #16a34a; color: #fff; transform: scale(1.03); }
  .creneau-pill.selected { background: #15803d; color: #fff; border-color: #14532d; }

  .loading {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    flex: 1; gap: 14px; padding: 40px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid #e2e8f0; border-top-color: #16a34a;
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { font-size: 13px; color: #64748b; }

  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(15,23,42,0.5); z-index: 100;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff; border-radius: 14px;
    padding: 24px; width: 320px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .modal h3 { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .modal .modal-sub { font-size: 12px; color: #64748b; margin-bottom: 18px; }
  .modal-creneau {
    background: #f0fdf4; border: 2px solid #16a34a;
    border-radius: 10px; padding: 14px 16px;
    margin-bottom: 18px; text-align: center;
  }
  .modal-creneau .mc-date { font-size: 16px; font-weight: 700; color: #15803d; }
  .modal-creneau .mc-heure { font-size: 13px; color: #16a34a; margin-top: 2px; }
  .modal-creneau .mc-duree { font-size: 11px; color: #86efac; margin-top: 4px; }
  .modal-actions { display: flex; gap: 8px; }
  .btn-annuler {
    flex: 1; padding: 10px; border: 1px solid #e2e8f0;
    background: #fff; border-radius: 8px; cursor: pointer;
    font-size: 13px; color: #64748b;
  }
  .btn-annuler:hover { background: #f8fafc; }
  .btn-valider {
    flex: 2; padding: 10px; border: none;
    background: #16a34a; color: #fff; border-radius: 8px;
    cursor: pointer; font-size: 13px; font-weight: 600;
  }
  .btn-valider:hover { background: #15803d; }
  .btn-valider:disabled { background: #94a3b8; cursor: not-allowed; }

  .footer {
    background: #fff; border-top: 1px solid #e2e8f0;
    padding: 10px 16px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
  }
  .footer-info { font-size: 11px; color: #94a3b8; }
  .legend { display: flex; gap: 10px; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: #64748b; }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }

  .error-box {
    margin: 20px; background: #fef2f2; border: 1px solid #fecaca;
    border-radius: 10px; padding: 20px; text-align: center; color: #dc2626; font-size: 13px;
  }
  .btn-login {
    margin-top: 12px; padding: 10px 20px; background: #16a34a;
    color: #fff; border: none; border-radius: 8px; cursor: pointer;
    font-size: 13px; font-weight: 600;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-dot"></div>
  <h1>Disponibilités commerciales</h1>
  <div class="header-badges">
    <span class="badge" id="badge-type">—</span>
    <span class="badge blue" id="badge-duree">—</span>
  </div>
</div>

<div class="nav-mois">
  <button onclick="changerMois(-1)">&#8592;</button>
  <h2 id="nav-titre">—</h2>
  <button onclick="changerMois(1)">&#8594;</button>
</div>

<div class="cal-wrapper" id="cal-wrapper">
  <div class="loading">
    <div class="spinner"></div>
    <p>Initialisation…</p>
  </div>
</div>

<div class="footer">
  <div class="footer-info" id="footer-info">Chargement…</div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#dcfce7;border:1px solid #86efac"></div> Dispo</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f1f5f9"></div> Indispo</div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>Confirmer ce créneau ?</h3>
    <p class="modal-sub">Les champs Date et Heure du lead seront préremplis.</p>
    <div class="modal-creneau">
      <div class="mc-date" id="modal-date">—</div>
      <div class="mc-heure" id="modal-heure">—</div>
      <div class="mc-duree" id="modal-duree">—</div>
    </div>
    <div class="modal-actions">
      <button class="btn-annuler" onclick="fermerModal()">Annuler</button>
      <button class="btn-valider" id="btn-valider" onclick="validerCreneau()">Valider et préremplir</button>
    </div>
  </div>
</div>

<script>
const CLIENT_ID     = '1000.2Z0UCDAXA9XLS30MHACJMSQAUH5EUJ';
const CLIENT_SECRET = '6e68128e56497ff70c4063a7fa1b862cee13db2c10';
const REFRESH_TOKEN = '1000.d1a6ca691c6d1139527925c7ea009121.eb3a6b2b61656d8bd816c4a51a5e88c8';
const ZOHO_BASE     = 'https://www.zohoapis.eu/crm/v8';
const TOKEN_PROXY   = 'https://zoho-token-proxy.olivierdubost.workers.dev';

let leadId        = null;
let accessToken   = null;
let disponibilites = {};
let dureeRdv      = 60;
let typeRdv       = '';
let moisCourant   = new Date();
let selectedDate  = null;
let selectedHeure = null;

const MOIS_FR = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
const JOURS_FR = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];

// ── INIT ────────────────────────────────────────────────────────
window.onload = async function() {
  const params = new URLSearchParams(window.location.search);
  leadId = params.get('lead_id');

  if (!leadId) {
    showError('Aucun lead_id fourni. Ouvrez ce widget depuis un lead Zoho CRM.');
    return;
  }

  accessToken = await getAccessToken();
  if (!accessToken) {
    showError('Impossible d\'obtenir un token Zoho. Contactez votre administrateur.');
    return;
  }

  moisCourant = new Date();
  moisCourant.setDate(1);
  chargerDisponibilites();
};

// ── REFRESH TOKEN → ACCESS TOKEN ─────────────────────────────────
async function getAccessToken() {
  const cached = localStorage.getItem('zoho_access_token');
  const expiry = parseInt(localStorage.getItem('zoho_token_expiry') || 0);
  if (cached && Date.now() < expiry) return cached;

  try {
    const resp = await fetch(TOKEN_PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'token' })
    });
    const data = await resp.json();
    if (data.access_token) {
      localStorage.setItem('zoho_access_token', data.access_token);
      localStorage.setItem('zoho_token_expiry', Date.now() + 55 * 60 * 1000);
      return data.access_token;
    }
    console.error('Token error:', JSON.stringify(data));
    return null;
  } catch(e) {
    console.error('Fetch token error:', e.message);
    return null;
  }
}

// ── APPEL FONCTION DELUGE ────────────────────────────────────────
async function chargerDisponibilites() {
  try {
    const resp = await fetch(TOKEN_PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'function', access_token: accessToken, lead_id: leadId })
    });

    const json = await resp.json();
    let data = null;

    // La réponse Zoho Functions est dans details.output
    try {
      const output = json.details && json.details.output ? json.details.output : json;
      data = typeof output === 'string' ? JSON.parse(output) : output;
    } catch(e) {
      showError('Réponse invalide de la fonction. Vérifiez la fonction verif_dispo.');
      return;
    }

    if (!data || data.status !== 'ok') {
      showError(data ? data.message : 'Erreur inconnue.');
      return;
    }

    dureeRdv = data.duree;
    typeRdv  = data.type_rdv;
    disponibilites = {};
    data.jours.forEach(j => { disponibilites[j.date] = j.creneaux; });

    document.getElementById('badge-type').textContent  = typeRdv;
    document.getElementById('badge-duree').textContent = dureeRdv + ' min';

    renderCalendrier();

  } catch(e) {
    // Token peut-être expiré → relancer OAuth
    localStorage.removeItem('zoho_access_token');
    localStorage.setItem('pending_lead_id', leadId);
    showError('Session expirée. <button class="btn-login" onclick="relancerOAuth()">Se reconnecter</button>');
  }
}

function relancerOAuth() {
  localStorage.removeItem('zoho_access_token');
  window.location.reload();
}

// ── CALENDRIER ───────────────────────────────────────────────────
function renderCalendrier() {
  const annee = moisCourant.getFullYear();
  const mois  = moisCourant.getMonth();

  document.getElementById('nav-titre').textContent = MOIS_FR[mois] + ' ' + annee;

  const premier = new Date(annee, mois, 1);
  const dernier = new Date(annee, mois + 1, 0);
  const today   = new Date(); today.setHours(0,0,0,0);

  let totalDispo = 0;
  Object.keys(disponibilites).forEach(d => {
    const dt = new Date(d);
    if (dt.getFullYear() === annee && dt.getMonth() === mois)
      totalDispo += disponibilites[d].length;
  });
  document.getElementById('footer-info').textContent =
    totalDispo + ' créneau' + (totalDispo > 1 ? 'x' : '') + ' disponible' + (totalDispo > 1 ? 's' : '') + ' ce mois';

  let depart = premier.getDay();
  depart = depart === 0 ? 6 : depart - 1;

  let html = '<div class="cal-grid">';
  ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'].forEach(j => {
    html += '<div class="cal-header-cell">' + j + '</div>';
  });

  for (let i = 0; i < depart; i++) {
    html += '<div class="cal-day autre-mois"></div>';
  }

  for (let d = 1; d <= dernier.getDate(); d++) {
    const dt      = new Date(annee, mois, d);
    const dow     = dt.getDay();
    const dateStr = annee + '-' + String(mois+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    const isToday   = dt.getTime() === today.getTime();
    const isPasse   = dt < today;
    const isWeekend = dow === 0 || dow === 6;
    const isOuvre   = dow >= 1 && dow <= 4;
    const creneaux  = disponibilites[dateStr] || [];
    const hasDispo  = creneaux.length > 0 && !isPasse && isOuvre;

    let classes = 'cal-day';
    if (isWeekend || !isOuvre) classes += ' weekend';
    if (hasDispo)  classes += ' has-dispo';
    if (isToday)   classes += ' today';

    html += '<div class="' + classes + '">';
    html += '<div class="day-num">' + d + '</div>';

    if (hasDispo) {
      creneaux.forEach(h => {
        const isSel = selectedDate === dateStr && selectedHeure === h;
        html += '<span class="creneau-pill' + (isSel ? ' selected' : '') + '" ' +
                'onclick="ouvrirModal(\'' + dateStr + '\',\'' + h + '\')">' + h + '</span>';
      });
    }
    html += '</div>';
  }

  const restant = (7 - (depart + dernier.getDate()) % 7) % 7;
  for (let i = 0; i < restant; i++) {
    html += '<div class="cal-day autre-mois"></div>';
  }
  html += '</div>';
  document.getElementById('cal-wrapper').innerHTML = html;
}

function changerMois(dir) {
  moisCourant.setMonth(moisCourant.getMonth() + dir);
  renderCalendrier();
}

// ── MODAL ────────────────────────────────────────────────────────
function ouvrirModal(dateStr, heure) {
  selectedDate  = dateStr;
  selectedHeure = heure;

  const dt     = new Date(dateStr + 'T00:00:00');
  const dateAff = JOURS_FR[dt.getDay()] + ' ' + dt.getDate() + ' ' + MOIS_FR[dt.getMonth()] + ' ' + dt.getFullYear();

  const [h, m] = heure.split(':').map(Number);
  const finMin  = h * 60 + m + dureeRdv;
  const heureFin = String(Math.floor(finMin/60)).padStart(2,'0') + ':' + String(finMin%60).padStart(2,'0');

  document.getElementById('modal-date').textContent  = dateAff;
  document.getElementById('modal-heure').textContent = heure + ' → ' + heureFin;
  document.getElementById('modal-duree').textContent = typeRdv + ' · ' + dureeRdv + ' min';
  document.getElementById('btn-valider').disabled    = false;
  document.getElementById('btn-valider').textContent = 'Valider et préremplir';
  document.getElementById('modal').classList.add('open');
}

function fermerModal() {
  document.getElementById('modal').classList.remove('open');
}

// ── VALIDATION ───────────────────────────────────────────────────
async function validerCreneau() {
  if (!selectedDate || !selectedHeure) return;

  document.getElementById('btn-valider').disabled    = true;
  document.getElementById('btn-valider').textContent = 'Enregistrement…';

  try {
    const resp = await fetch(TOKEN_PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'update', access_token: accessToken, lead_id: leadId, date: selectedDate, heure: selectedHeure })
    });

    const json = await resp.json();
    if (json.data && json.data[0] && json.data[0].status === 'success') {
      document.getElementById('btn-valider').textContent = '✓ Prérempli !';
      document.getElementById('btn-valider').style.background = '#15803d';
      setTimeout(() => { fermerModal(); }, 1500);
    } else {
      throw new Error('Update failed');
    }
  } catch(e) {
    document.getElementById('btn-valider').disabled    = false;
    document.getElementById('btn-valider').textContent = 'Réessayer';
    alert('Erreur lors de la mise à jour. Vérifiez vos permissions.');
  }
}

function showError(msg) {
  document.getElementById('cal-wrapper').innerHTML = '<div class="error-box">⚠ ' + msg + '</div>';
}

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) fermerModal();
});
</script>
</body>
</html>
