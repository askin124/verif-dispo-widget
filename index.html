<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vérif Dispo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f8fafc; color: #1e293b;
    min-height: 100vh; display: flex; flex-direction: column;
  }
  .header {
    background: #fff; border-bottom: 1px solid #e2e8f0;
    padding: 12px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  }
  .header-dot { width: 8px; height: 8px; border-radius: 50%; background: #16a34a; }
  .header h1 { font-size: 14px; font-weight: 600; }
  .header-badges { margin-left: auto; display: flex; gap: 6px; }
  .badge { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 20px; background: #dcfce7; color: #15803d; }
  .badge.blue { background: #dbeafe; color: #1d4ed8; }
  .badge.orange { background: #ffedd5; color: #c2410c; }

  .nav-mois {
    background: #fff; border-bottom: 1px solid #e2e8f0;
    padding: 8px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  .nav-mois button {
    background: none; border: 1px solid #e2e8f0; border-radius: 6px;
    padding: 4px 10px; cursor: pointer; font-size: 13px; color: #475569;
  }
  .nav-mois button:hover { background: #f1f5f9; }
  .nav-mois h2 { font-size: 14px; font-weight: 600; color: #1e293b; text-transform: capitalize; }

  .cal-wrapper { flex: 1; overflow-y: auto; padding: 12px 16px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .cal-header-cell {
    text-align: center; font-size: 11px; font-weight: 700;
    color: #94a3b8; padding: 4px 0 8px; letter-spacing: 0.5px; text-transform: uppercase;
  }
  .cal-day {
    min-height: 72px; border-radius: 8px; padding: 6px;
    background: #fff; border: 1px solid #f1f5f9;
  }
  .cal-day.autre-mois { background: #f8fafc; border-color: transparent; }
  .cal-day.autre-mois .day-num { color: #cbd5e1; }
  .cal-day.weekend { background: #fafafa; border-color: transparent; }
  .cal-day.weekend .day-num { color: #e2e8f0; }
  .cal-day.has-dispo { background: #fff; border-color: #bbf7d0; }
  .cal-day.has-dispo:hover { border-color: #16a34a; box-shadow: 0 2px 8px rgba(22,163,74,0.12); }
  .cal-day.today .day-num {
    background: #16a34a; color: #fff; width: 22px; height: 22px;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
  }
  .day-num {
    font-size: 12px; font-weight: 600; color: #475569;
    margin-bottom: 4px; width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
  }
  .creneau-pill {
    display: block; font-size: 10px; font-weight: 600;
    background: #dcfce7; color: #15803d; border-radius: 4px;
    padding: 2px 4px; margin-bottom: 2px; cursor: pointer;
    text-align: center; transition: all 0.1s; border: 1px solid transparent;
  }
  .creneau-pill:hover { background: #16a34a; color: #fff; transform: scale(1.03); }
  .creneau-pill.selected { background: #15803d; color: #fff; border-color: #14532d; }

  /* Écran de sélection type RDV */
  .type-screen {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; flex: 1; padding: 30px 20px; gap: 16px;
  }
  .type-screen h2 { font-size: 16px; font-weight: 700; color: #1e293b; }
  .type-screen p { font-size: 13px; color: #64748b; text-align: center; }
  .type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 340px; }
  .type-btn {
    padding: 16px 12px; border: 2px solid #e2e8f0; border-radius: 10px;
    background: #fff; cursor: pointer; text-align: center; transition: all 0.15s;
  }
  .type-btn:hover { border-color: #16a34a; background: #f0fdf4; }
  .type-btn.selected { border-color: #16a34a; background: #f0fdf4; }
  .type-btn .type-icon { font-size: 24px; margin-bottom: 6px; }
  .type-btn .type-name { font-size: 13px; font-weight: 600; color: #1e293b; }
  .type-btn .type-duree { font-size: 11px; color: #64748b; margin-top: 2px; }
  .btn-confirmer-type {
    width: 100%; max-width: 340px; padding: 13px; background: #16a34a;
    color: #fff; border: none; border-radius: 8px; font-size: 14px;
    font-weight: 600; cursor: pointer;
  }
  .btn-confirmer-type:disabled { background: #cbd5e1; cursor: not-allowed; }

  .loading {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; flex: 1; gap: 14px; padding: 40px;
  }
  .spinner {
    width: 36px; height: 36px; border: 3px solid #e2e8f0;
    border-top-color: #16a34a; border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { font-size: 13px; color: #64748b; }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(15,23,42,0.5); z-index: 100;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff; border-radius: 14px; padding: 24px; width: 320px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .modal h3 { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .modal .modal-sub { font-size: 12px; color: #64748b; margin-bottom: 18px; line-height: 1.5; }
  .modal-creneau {
    background: #f0fdf4; border: 2px solid #16a34a;
    border-radius: 10px; padding: 14px 16px; margin-bottom: 18px; text-align: center;
  }
  .modal-creneau.modif { background: #fff7ed; border-color: #f97316; }
  .mc-date { font-size: 16px; font-weight: 700; color: #15803d; }
  .modal-creneau.modif .mc-date { color: #c2410c; }
  .mc-heure { font-size: 13px; color: #16a34a; margin-top: 2px; }
  .modal-creneau.modif .mc-heure { color: #f97316; }
  .mc-duree { font-size: 11px; color: #86efac; margin-top: 4px; }
  .modal-actions { display: flex; gap: 8px; }
  .btn-annuler {
    flex: 1; padding: 10px; border: 1px solid #e2e8f0;
    background: #fff; border-radius: 8px; cursor: pointer; font-size: 13px; color: #64748b;
  }
  .btn-valider {
    flex: 2; padding: 10px; border: none; background: #16a34a;
    color: #fff; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600;
  }
  .btn-valider.modif { background: #f97316; }
  .btn-valider:disabled { background: #94a3b8; cursor: not-allowed; }

  .footer {
    background: #fff; border-top: 1px solid #e2e8f0;
    padding: 10px 16px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
  }
  .footer-info { font-size: 11px; color: #94a3b8; }
  .legend { display: flex; gap: 10px; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: #64748b; }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }

  .error-box {
    margin: 20px; background: #fef2f2; border: 1px solid #fecaca;
    border-radius: 10px; padding: 20px; text-align: center; color: #dc2626; font-size: 13px;
  }
  .success-box {
    background: #f0fdf4; border: 1.5px solid #9ae6b4; border-radius: 10px;
    padding: 20px; text-align: center; color: #276749; font-size: 13px; line-height: 1.6;
  }
  .success-box .si { font-size: 32px; margin-bottom: 10px; }
  .success-box strong { display: block; font-size: 15px; margin-bottom: 4px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-dot"></div>
  <h1>Disponibilités commerciales</h1>
  <div class="header-badges">
    <span class="badge" id="badge-type">—</span>
    <span class="badge blue" id="badge-duree">—</span>
    <span class="badge orange" id="badge-mode" style="display:none">Modification</span>
  </div>
</div>

<div class="nav-mois" id="nav-mois" style="display:none">
  <button onclick="changerMois(-1)">&#8592;</button>
  <h2 id="nav-titre">—</h2>
  <button onclick="changerMois(1)">&#8594;</button>
</div>

<div class="cal-wrapper" id="cal-wrapper">
  <!-- Écran 1 : sélection type RDV -->
  <div class="type-screen" id="type-screen">
    <h2>Type de rendez-vous</h2>
    <p>Sélectionnez le type de RDV à positionner</p>
    <div class="type-grid">
      <div class="type-btn" id="btn-ISO" onclick="selectType('ISO',60)">
        <div class="type-icon">🏠</div>
        <div class="type-name">ISO</div>
        <div class="type-duree">60 min</div>
      </div>
      <div class="type-btn" id="btn-ITE" onclick="selectType('ITE',90)">
        <div class="type-icon">🧱</div>
        <div class="type-name">ITE</div>
        <div class="type-duree">90 min</div>
      </div>
      <div class="type-btn" id="btn-Toiture" onclick="selectType('Toiture',90)">
        <div class="type-icon">🏗️</div>
        <div class="type-name">Toiture</div>
        <div class="type-duree">90 min</div>
      </div>
      <div class="type-btn" id="btn-Autre" onclick="selectType('Autre',60)">
        <div class="type-icon">📋</div>
        <div class="type-name">Autre</div>
        <div class="type-duree">60 min</div>
      </div>
    </div>
    <button class="btn-confirmer-type" id="btn-confirmer-type" disabled onclick="confirmerType()">
      Voir les disponibilités
    </button>
  </div>
</div>

<div class="footer">
  <div class="footer-info" id="footer-info"></div>
  <div class="legend" id="legend" style="display:none">
    <div class="legend-item"><div class="legend-dot" style="background:#dcfce7;border:1px solid #86efac"></div> Dispo</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f1f5f9"></div> Indispo</div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-titre">Confirmer ce créneau ?</h3>
    <p class="modal-sub" id="modal-sub">Les champs Date et Heure du lead seront préremplis.</p>
    <div class="modal-creneau" id="modal-creneau">
      <div class="mc-date" id="modal-date">—</div>
      <div class="mc-heure" id="modal-heure">—</div>
      <div class="mc-duree" id="modal-duree">—</div>
    </div>
    <div class="modal-actions">
      <button class="btn-annuler" onclick="fermerModal()">Annuler</button>
      <button class="btn-valider" id="btn-valider" onclick="validerCreneau()">Valider et créer RDV</button>
    </div>
  </div>
</div>

<script>
const TOKEN_PROXY = 'https://zoho-token-proxy.olivierdubost.workers.dev';
const MOIS_FR    = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
const JOURS_FR   = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];

let leadId         = null;
let accessToken    = null;
let disponibilites = {};
let dataPlanningComplet = [];
let dureeRdv       = 60;
let typeRdv        = '';
let moisCourant    = new Date();
let selectedDate   = null;
let selectedHeure  = null;
let modeModif      = false;

// ── INIT ──────────────────────────────────────────────────────────
window.onload = async function() {
  const params = new URLSearchParams(window.location.search);
  leadId = params.get('lead_id');
  if (!leadId) { showError('Aucun lead_id fourni.'); return; }

  accessToken = await getAccessToken();
  if (!accessToken) { showError('Impossible d\'obtenir un token Zoho.'); return; }

  // Vérifier si le lead a déjà un ID google event → mode modification
  const leadResp = await fetch(TOKEN_PROXY, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'get_lead', lead_id: leadId, access_token: accessToken })
  });
  const leadJson = await leadResp.json();
  const leadData = leadJson.details && leadJson.details.output ? JSON.parse(leadJson.details.output) : null;

  if (leadData && leadData.id_google_event) {
    modeModif = true;
    document.getElementById('badge-mode').style.display = 'inline';
    document.getElementById('modal-titre').textContent   = 'Modifier ce créneau ?';
    document.getElementById('modal-sub').textContent     = 'Le RDV Google Calendar existant sera modifié.';
    document.getElementById('modal-creneau').classList.add('modif');
    document.getElementById('btn-valider').classList.add('modif');
    document.getElementById('btn-valider').textContent   = 'Modifier le RDV';
  }

  // Afficher l'écran de sélection du type RDV
  document.getElementById('type-screen').style.display = 'flex';
};

// ── TOKEN ──────────────────────────────────────────────────────────
async function getAccessToken() {
  const cached = localStorage.getItem('zoho_access_token');
  const expiry  = parseInt(localStorage.getItem('zoho_token_expiry') || 0);
  if (cached && Date.now() < expiry) return cached;
  try {
    const resp = await fetch(TOKEN_PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'token' })
    });
    const data = await resp.json();
    if (data.access_token) {
      localStorage.setItem('zoho_access_token', data.access_token);
      localStorage.setItem('zoho_token_expiry', Date.now() + 55 * 60 * 1000);
      return data.access_token;
    }
    return null;
  } catch(e) { return null; }
}

// ── SÉLECTION TYPE RDV ────────────────────────────────────────────
function selectType(type, duree) {
  typeRdv  = type;
  dureeRdv = duree;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('btn-' + type).classList.add('selected');
  document.getElementById('btn-confirmer-type').disabled = false;
  document.getElementById('badge-type').textContent  = type;
  document.getElementById('badge-duree').textContent = duree + ' min';
}

function confirmerType() {
  document.getElementById('type-screen').style.display  = 'none';
  document.getElementById('nav-mois').style.display     = 'flex';
  document.getElementById('legend').style.display       = 'flex';
  document.getElementById('cal-wrapper').innerHTML      = '<div class="loading"><div class="spinner"></div><p>Analyse des agendas en cours…</p></div>';
  moisCourant = new Date(); moisCourant.setDate(1);
  chargerDisponibilites();
}

// ── CHARGEMENT DISPOS ─────────────────────────────────────────────
async function chargerDisponibilites() {
  try {
    const resp = await fetch(TOKEN_PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'function', access_token: accessToken, lead_id: leadId, type_rdv: typeRdv })
    });
    const json   = await resp.json();
    const output = json.details && json.details.output ? json.details.output : null;
    const data   = output ? JSON.parse(output) : null;

    if (!data || data.status !== 'ok') {
      showError(data ? data.message : 'Erreur inconnue.');
      return;
    }

    dataPlanningComplet = data.jours_complet || [];

    if (data.planning_requis) {
      showOuvrirPlanning(data.zone_prospect);
      return;
    }

    disponibilites = {};
    data.jours.forEach(j => { disponibilites[j.date] = j.creneaux; });
    renderCalendrier();
  } catch(e) {
    showError('Erreur lors du chargement : ' + e.message);
  }
}

function showOuvrirPlanning(zone) {
  document.getElementById('nav-mois').style.display = 'none';
  document.getElementById('legend').style.display    = 'none';
  document.getElementById('cal-wrapper').innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:40px 20px;gap:14px;text-align:center;">
      <div style="font-size:32px;">📅</div>
      <h3 style="font-size:15px;font-weight:700;color:#1e293b;">Aucun RDV dans cette zone (${zone})</h3>
      <p style="font-size:13px;color:#64748b;max-width:280px;">
        Il n'y a pas encore de rendez-vous planifié dans cette zone sur la période. Ouvrez le planning complet pour voir toutes les disponibilités.
      </p>
      <button onclick="ouvrirPlanningComplet()" style="margin-top:8px;padding:12px 24px;background:#16a34a;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;">
        Ouvrir le planning
      </button>
    </div>`;
}

function ouvrirPlanningComplet() {
  document.getElementById('nav-mois').style.display = 'flex';
  document.getElementById('legend').style.display    = 'flex';
  disponibilites = {};
  dataPlanningComplet.forEach(j => { disponibilites[j.date] = j.creneaux; });
  renderCalendrier();
}

// ── CALENDRIER ────────────────────────────────────────────────────
function renderCalendrier() {
  const annee   = moisCourant.getFullYear();
  const mois    = moisCourant.getMonth();
  document.getElementById('nav-titre').textContent = MOIS_FR[mois] + ' ' + annee;

  const premier = new Date(annee, mois, 1);
  const dernier = new Date(annee, mois + 1, 0);
  const today   = new Date(); today.setHours(0,0,0,0);

  let totalDispo = 0;
  Object.keys(disponibilites).forEach(d => {
    const dt = new Date(d);
    if (dt.getFullYear() === annee && dt.getMonth() === mois)
      totalDispo += disponibilites[d].length;
  });
  document.getElementById('footer-info').textContent =
    totalDispo + ' créneau' + (totalDispo > 1 ? 'x' : '') + ' disponible' + (totalDispo > 1 ? 's' : '') + ' ce mois';

  let depart = premier.getDay();
  depart = depart === 0 ? 6 : depart - 1;

  let html = '<div class="cal-grid">';
  ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'].forEach(j => {
    html += '<div class="cal-header-cell">' + j + '</div>';
  });
  for (let i = 0; i < depart; i++) html += '<div class="cal-day autre-mois"></div>';

  for (let d = 1; d <= dernier.getDate(); d++) {
    const dt      = new Date(annee, mois, d);
    const dow     = dt.getDay();
    const dateStr = annee + '-' + String(mois+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    const isToday   = dt.getTime() === today.getTime();
    const isPasse   = dt < today;
    const isOuvre   = dow >= 1 && dow <= 4;
    const creneaux  = disponibilites[dateStr] || [];
    const hasDispo  = creneaux.length > 0 && !isPasse && isOuvre;

    let classes = 'cal-day';
    if (!isOuvre) classes += ' weekend';
    if (hasDispo) classes += ' has-dispo';
    if (isToday)  classes += ' today';

    html += '<div class="' + classes + '"><div class="day-num">' + d + '</div>';
    if (hasDispo) {
      creneaux.forEach(h => {
        const isSel = selectedDate === dateStr && selectedHeure === h;
        html += '<span class="creneau-pill' + (isSel ? ' selected' : '') + '" onclick="ouvrirModal(\'' + dateStr + '\',\'' + h + '\')">' + h + '</span>';
      });
    }
    html += '</div>';
  }

  const restant = (7 - (depart + dernier.getDate()) % 7) % 7;
  for (let i = 0; i < restant; i++) html += '<div class="cal-day autre-mois"></div>';
  html += '</div>';
  document.getElementById('cal-wrapper').innerHTML = html;
}

function changerMois(dir) {
  moisCourant.setMonth(moisCourant.getMonth() + dir);
  renderCalendrier();
}

// ── MODAL ─────────────────────────────────────────────────────────
function ouvrirModal(dateStr, heure) {
  selectedDate  = dateStr;
  selectedHeure = heure;
  const dt      = new Date(dateStr + 'T00:00:00');
  const dateAff = JOURS_FR[dt.getDay()] + ' ' + dt.getDate() + ' ' + MOIS_FR[dt.getMonth()] + ' ' + dt.getFullYear();
  const [h, m]  = heure.split(':').map(Number);
  const finMin  = h * 60 + m + dureeRdv;
  const hFin    = String(Math.floor(finMin/60)).padStart(2,'0') + ':' + String(finMin%60).padStart(2,'0');
  document.getElementById('modal-date').textContent  = dateAff;
  document.getElementById('modal-heure').textContent = heure + ' → ' + hFin;
  document.getElementById('modal-duree').textContent = typeRdv + ' · ' + dureeRdv + ' min';
  document.getElementById('btn-valider').disabled    = false;
  document.getElementById('modal').classList.add('open');
}

function fermerModal() { document.getElementById('modal').classList.remove('open'); }

// ── VALIDATION ────────────────────────────────────────────────────
async function validerCreneau() {
  if (!selectedDate || !selectedHeure) return;
  const btn = document.getElementById('btn-valider');
  btn.disabled = true;
  btn.textContent = 'Enregistrement…';

  try {
    // 1. Préremplir date/heure dans le lead
    const respUpdate = await fetch(TOKEN_PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'update', access_token: accessToken,
        lead_id: leadId, date: selectedDate, heure: selectedHeure
      })
    });
    const jsonUpdate = await respUpdate.json();
    console.log('Update:', JSON.stringify(jsonUpdate));

    // 2. Créer ou modifier le RDV Google Calendar
    btn.textContent = modeModif ? 'Modification RDV…' : 'Création RDV…';
    const actionRdv = modeModif ? 'modif_rdv' : 'create_rdv';
    const respRdv   = await fetch(TOKEN_PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: actionRdv, access_token: accessToken, lead_id: leadId })
    });
    const jsonRdv = await respRdv.json();
    const output  = jsonRdv.details && jsonRdv.details.output ? jsonRdv.details.output : '';
    console.log('RDV output:', output);

    // Succès si pas de message d'erreur connu
    const isError = output.includes('erreur') || output.includes('Veuillez') || output.includes('n\'a pas pu');
    if (isError) {
      document.getElementById('modal-sub').textContent = output;
      document.getElementById('modal-sub').style.color = '#dc2626';
      btn.disabled    = false;
      btn.textContent = 'Réessayer';
    } else {
      document.getElementById('cal-wrapper').innerHTML = `
        <div style="padding:30px">
          <div class="success-box">
            <div class="si">✓</div>
            <strong>${modeModif ? 'RDV modifié !' : 'RDV créé !'}</strong>
            ${selectedDate} à ${selectedHeure}<br>
            <small>${output || 'Bonne journée !'}</small>
          </div>
        </div>`;
      fermerModal();
    }
  } catch(e) {
    btn.disabled    = false;
    btn.textContent = 'Réessayer';
    document.getElementById('modal-sub').textContent = 'Erreur : ' + e.message;
    document.getElementById('modal-sub').style.color = '#dc2626';
  }
}

function showError(msg) {
  document.getElementById('cal-wrapper').innerHTML = '<div class="error-box">⚠ ' + msg + '</div>';
}

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) fermerModal();
});
</script>
</body>
</html>
