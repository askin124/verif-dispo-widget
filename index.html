<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vérif Dispo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f8fafc;
    color: #1e293b;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  .header {
    background: #fff;
    border-bottom: 1px solid #e2e8f0;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .header-dot { width: 8px; height: 8px; border-radius: 50%; background: #16a34a; }
  .header h1  { font-size: 14px; font-weight: 600; }
  .header-badges { margin-left: auto; display: flex; gap: 6px; }
  .badge {
    font-size: 11px; font-weight: 600; padding: 3px 8px;
    border-radius: 20px; background: #dcfce7; color: #15803d;
  }
  .badge.blue { background: #dbeafe; color: #1d4ed8; }

  /* ── NAV MOIS ── */
  .nav-mois {
    background: #fff;
    border-bottom: 1px solid #e2e8f0;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .nav-mois button {
    background: none; border: 1px solid #e2e8f0; border-radius: 6px;
    padding: 4px 10px; cursor: pointer; font-size: 13px; color: #475569;
  }
  .nav-mois button:hover { background: #f1f5f9; }
  .nav-mois h2 { font-size: 14px; font-weight: 600; color: #1e293b; text-transform: capitalize; }

  /* ── CALENDRIER ── */
  .cal-wrapper { flex: 1; overflow-y: auto; padding: 12px 16px; }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }

  .cal-header-cell {
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    color: #94a3b8;
    padding: 4px 0 8px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .cal-day {
    min-height: 72px;
    border-radius: 8px;
    padding: 6px;
    position: relative;
    background: #fff;
    border: 1px solid #f1f5f9;
  }

  .cal-day.autre-mois { background: #f8fafc; border-color: transparent; }
  .cal-day.autre-mois .day-num { color: #cbd5e1; }

  .cal-day.weekend   { background: #fafafa; border-color: transparent; }
  .cal-day.weekend .day-num { color: #e2e8f0; }

  .cal-day.has-dispo { background: #fff; border-color: #bbf7d0; }
  .cal-day.has-dispo:hover { border-color: #16a34a; box-shadow: 0 2px 8px rgba(22,163,74,0.12); }

  .cal-day.today .day-num {
    background: #16a34a; color: #fff;
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }

  .day-num {
    font-size: 12px; font-weight: 600; color: #475569;
    margin-bottom: 4px;
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
  }

  .creneau-pill {
    display: block;
    font-size: 10px;
    font-weight: 600;
    background: #dcfce7;
    color: #15803d;
    border-radius: 4px;
    padding: 2px 4px;
    margin-bottom: 2px;
    cursor: pointer;
    text-align: center;
    transition: all 0.1s;
    border: 1px solid transparent;
  }
  .creneau-pill:hover {
    background: #16a34a;
    color: #fff;
    transform: scale(1.03);
  }
  .creneau-pill.selected {
    background: #15803d;
    color: #fff;
    border-color: #14532d;
  }

  /* ── LOADING ── */
  .loading {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    flex: 1; gap: 14px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid #e2e8f0; border-top-color: #16a34a;
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { font-size: 13px; color: #64748b; }

  /* ── MODAL CONFIRMATION ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(15,23,42,0.5); z-index: 100;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: #fff; border-radius: 14px;
    padding: 24px; width: 320px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .modal h3 { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .modal .modal-sub { font-size: 12px; color: #64748b; margin-bottom: 18px; }

  .modal-creneau {
    background: #f0fdf4; border: 2px solid #16a34a;
    border-radius: 10px; padding: 14px 16px;
    margin-bottom: 18px; text-align: center;
  }
  .modal-creneau .mc-date { font-size: 16px; font-weight: 700; color: #15803d; }
  .modal-creneau .mc-heure { font-size: 13px; color: #16a34a; margin-top: 2px; }
  .modal-creneau .mc-duree { font-size: 11px; color: #86efac; margin-top: 4px; }

  .modal-actions { display: flex; gap: 8px; }
  .btn-annuler {
    flex: 1; padding: 10px; border: 1px solid #e2e8f0;
    background: #fff; border-radius: 8px; cursor: pointer;
    font-size: 13px; color: #64748b;
  }
  .btn-annuler:hover { background: #f8fafc; }
  .btn-valider {
    flex: 2; padding: 10px; border: none;
    background: #16a34a; color: #fff; border-radius: 8px;
    cursor: pointer; font-size: 13px; font-weight: 600;
  }
  .btn-valider:hover { background: #15803d; }
  .btn-valider:disabled { background: #94a3b8; cursor: not-allowed; }

  /* ── FOOTER ── */
  .footer {
    background: #fff; border-top: 1px solid #e2e8f0;
    padding: 10px 16px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
  }
  .footer-info { font-size: 11px; color: #94a3b8; }
  .legend { display: flex; gap: 10px; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: #64748b; }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }

  /* ── ERREUR ── */
  .error-box {
    margin: 20px; background: #fef2f2; border: 1px solid #fecaca;
    border-radius: 10px; padding: 20px; text-align: center; color: #dc2626;
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-dot"></div>
  <h1>Disponibilités commerciales</h1>
  <div class="header-badges">
    <span class="badge" id="badge-type">—</span>
    <span class="badge blue" id="badge-duree">—</span>
  </div>
</div>

<!-- NAV MOIS -->
<div class="nav-mois">
  <button onclick="changerMois(-1)">&#8592;</button>
  <h2 id="nav-titre">—</h2>
  <button onclick="changerMois(1)">&#8594;</button>
</div>

<!-- CONTENU PRINCIPAL -->
<div class="cal-wrapper" id="cal-wrapper">
  <div class="loading">
    <div class="spinner"></div>
    <p>Analyse des agendas en cours…</p>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  <div class="footer-info" id="footer-info">Chargement…</div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#dcfce7;border:1px solid #86efac"></div> Dispo</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f1f5f9"></div> Indispo</div>
  </div>
</div>

<!-- MODAL CONFIRMATION -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>Confirmer ce créneau ?</h3>
    <p class="modal-sub">Les champs Date et Heure du lead seront préremplis.</p>
    <div class="modal-creneau">
      <div class="mc-date" id="modal-date">—</div>
      <div class="mc-heure" id="modal-heure">—</div>
      <div class="mc-duree" id="modal-duree">—</div>
    </div>
    <div class="modal-actions">
      <button class="btn-annuler" onclick="fermerModal()">Annuler</button>
      <button class="btn-valider" id="btn-valider" onclick="validerCreneau()">Valider et préremplir</button>
    </div>
  </div>
</div>

<script>
// ─── ÉTAT GLOBAL ────────────────────────────────────────────────
let leadId       = null;
let disponibilites = {}; // { "2026-06-23": ["10:00","14:00"], ... }
let dureeRdv     = 60;
let typeRdv      = '';
let moisCourant  = new Date();
let selectedDate = null;
let selectedHeure = null;
const JOURS_FR   = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
const MOIS_FR    = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];

// ─── INIT SDK ZOHO ──────────────────────────────────────────────
const sdkScript = document.createElement('script');
sdkScript.src = 'https://live.zwidgets.com/js-sdk/1.2/ZohoEmbededAppSDK.min.js';
sdkScript.onload = () => {
  ZOHO.embeddedApp.on('PageLoad', function(data) {
    leadId = data.EntityId;
    moisCourant = new Date();
    moisCourant.setDate(1);
    chargerDisponibilites();
  });
  ZOHO.embeddedApp.init();
};
sdkScript.onerror = () => {
  // Mode dev : données de test
  leadId = 'TEST';
  moisCourant = new Date();
  moisCourant.setDate(1);
  disponibilites = {
    '2026-06-23': ['10:00','14:00'],
    '2026-06-24': ['10:00','12:00','16:00'],
    '2026-06-25': ['14:00','18:00'],
    '2026-06-26': ['10:00'],
    '2026-06-30': ['12:00','14:00'],
    '2026-07-01': ['10:00','16:00','18:00'],
    '2026-07-02': ['14:00'],
    '2026-07-03': ['10:00','12:00'],
  };
  dureeRdv = 90;
  typeRdv  = 'ITE';
  renderHeader();
  renderCalendrier();
};
document.head.appendChild(sdkScript);

// ─── CHARGEMENT DONNÉES ──────────────────────────────────────────
function chargerDisponibilites() {
  ZOHO.CRM.FUNCTIONS.execute('verif_dispo', {
    lead_id: { type: 'string', value: leadId }
  }).then(function(resp) {
    let raw = resp.details.output;
    let data;
    try { data = JSON.parse(raw); } catch(e) { data = null; }

    if (!data || data.status !== 'ok') {
      document.getElementById('cal-wrapper').innerHTML =
        '<div class="error-box">⚠ ' + (data ? data.message : 'Erreur inattendue.') + '</div>';
      return;
    }

    // Construire le dictionnaire date → créneaux
    dureeRdv = data.duree;
    typeRdv  = data.type_rdv;
    disponibilites = {};
    data.jours.forEach(j => { disponibilites[j.date] = j.creneaux; });

    renderHeader();
    renderCalendrier();
  }).catch(function() {
    document.getElementById('cal-wrapper').innerHTML =
      '<div class="error-box">⚠ Impossible d\'appeler la fonction. Contactez votre administrateur.</div>';
  });
}

// ─── HEADER ─────────────────────────────────────────────────────
function renderHeader() {
  document.getElementById('badge-type').textContent  = typeRdv;
  document.getElementById('badge-duree').textContent = dureeRdv + ' min';
}

// ─── CALENDRIER ─────────────────────────────────────────────────
function renderCalendrier() {
  const annee = moisCourant.getFullYear();
  const mois  = moisCourant.getMonth();

  document.getElementById('nav-titre').textContent =
    MOIS_FR[mois] + ' ' + annee;

  const premier = new Date(annee, mois, 1);
  const dernier = new Date(annee, mois + 1, 0);
  const today   = new Date(); today.setHours(0,0,0,0);

  // Compter les dispos dans ce mois
  let totalDispo = 0;
  Object.keys(disponibilites).forEach(d => {
    const dt = new Date(d);
    if (dt.getFullYear() === annee && dt.getMonth() === mois)
      totalDispo += disponibilites[d].length;
  });
  document.getElementById('footer-info').textContent =
    totalDispo + ' créneau' + (totalDispo > 1 ? 'x' : '') + ' disponible' + (totalDispo > 1 ? 's' : '') + ' ce mois';

  // Décalage de départ (0=Dim → on veut Lun en premier)
  let depart = premier.getDay(); // 0=dim
  depart = depart === 0 ? 6 : depart - 1; // 0=Lun...6=Dim

  let html = '<div class="cal-grid">';

  // En-têtes jours
  ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'].forEach(j => {
    html += '<div class="cal-header-cell">' + j + '</div>';
  });

  // Cases vides avant le 1er
  for (let i = 0; i < depart; i++) {
    html += '<div class="cal-day autre-mois"></div>';
  }

  // Cases du mois
  for (let d = 1; d <= dernier.getDate(); d++) {
    const dt       = new Date(annee, mois, d);
    const dow      = dt.getDay(); // 0=dim
    const dateStr  = annee + '-' + String(mois+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    const isToday  = dt.getTime() === today.getTime();
    const isPasse  = dt < today;
    const isWeekend = dow === 0 || dow === 6;
    // Lun-Jeu seulement (dow 1,2,3,4)
    const isOuvre  = dow >= 1 && dow <= 4;
    const creneaux = disponibilites[dateStr] || [];
    const hasDispo = creneaux.length > 0 && !isPasse;

    let classes = 'cal-day';
    if (isWeekend)      classes += ' weekend';
    if (!isOuvre && !isWeekend) classes += ' weekend'; // Ven = grisé aussi
    if (hasDispo)       classes += ' has-dispo';
    if (isToday)        classes += ' today';

    html += '<div class="' + classes + '">';
    html += '<div class="day-num">' + d + '</div>';

    if (hasDispo) {
      creneaux.forEach(h => {
        const isSelected = selectedDate === dateStr && selectedHeure === h;
        html += '<span class="creneau-pill' + (isSelected ? ' selected' : '') + '" ' +
                'onclick="ouvrirModal(\'' + dateStr + '\',\'' + h + '\')">' + h + '</span>';
      });
    }

    html += '</div>';
  }

  // Cases vides après le dernier
  const restant = (7 - (depart + dernier.getDate()) % 7) % 7;
  for (let i = 0; i < restant; i++) {
    html += '<div class="cal-day autre-mois"></div>';
  }

  html += '</div>';
  document.getElementById('cal-wrapper').innerHTML = html;
}

// ─── NAVIGATION MOIS ────────────────────────────────────────────
function changerMois(dir) {
  moisCourant.setMonth(moisCourant.getMonth() + dir);
  renderCalendrier();
}

// ─── MODAL ──────────────────────────────────────────────────────
function ouvrirModal(dateStr, heure) {
  selectedDate  = dateStr;
  selectedHeure = heure;

  const dt     = new Date(dateStr + 'T00:00:00');
  const jourFR = JOURS_FR[dt.getDay()];
  const dateAff = jourFR + ' ' + dt.getDate() + ' ' + MOIS_FR[dt.getMonth()] + ' ' + dt.getFullYear();

  // Calculer heure de fin
  const [h, m] = heure.split(':').map(Number);
  const finMin  = h * 60 + m + dureeRdv;
  const hFin    = String(Math.floor(finMin / 60)).padStart(2,'0');
  const mFin    = String(finMin % 60).padStart(2,'0');
  const heureFin = hFin + ':' + mFin;

  document.getElementById('modal-date').textContent  = dateAff;
  document.getElementById('modal-heure').textContent = heure + ' → ' + heureFin;
  document.getElementById('modal-duree').textContent = typeRdv + ' · ' + dureeRdv + ' min';
  document.getElementById('btn-valider').disabled    = false;
  document.getElementById('btn-valider').textContent = 'Valider et préremplir';
  document.getElementById('modal').classList.add('open');
}

function fermerModal() {
  document.getElementById('modal').classList.remove('open');
}

// ─── VALIDATION → PRÉREMPLISSAGE LEAD ───────────────────────────
function validerCreneau() {
  if (!selectedDate || !selectedHeure) return;

  document.getElementById('btn-valider').disabled    = true;
  document.getElementById('btn-valider').textContent = 'Enregistrement…';

  // Format date pour Zoho : yyyy-MM-dd (déjà bon)
  // Heure : "10:00" → garder tel quel pour Cr_neau_horaire
  ZOHO.CRM.API.updateRecord({
    Entity: 'Leads',
    APIData: {
      id: leadId,
      Date_du_rendez_vous: selectedDate,
      Cr_neau_horaire: selectedHeure
    }
  }).then(function() {
    document.getElementById('btn-valider').textContent = '✓ Prérempli !';
    document.getElementById('btn-valider').style.background = '#15803d';

    // Rafraîchir la page CRM pour que le télépro voie les champs mis à jour
    setTimeout(() => {
      fermerModal();
      ZOHO.CRM.UI.Record.reload();
    }, 1200);
  }).catch(function() {
    document.getElementById('btn-valider').disabled    = false;
    document.getElementById('btn-valider').textContent = 'Valider et préremplir';
    alert('Erreur lors de la mise à jour du lead. Vérifiez vos permissions.');
  });
}

// Fermer modal en cliquant en dehors
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) fermerModal();
});
</script>
</body>
</html>
